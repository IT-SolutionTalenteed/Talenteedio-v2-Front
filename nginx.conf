# Configuration Nginx pour Talenteedio-v2-Front (Vue.js SPA)
# À placer dans /etc/nginx/sites-available/talenteed-front.conf

server {
    listen 80;
    listen [::]:80;
    server_name talenteed.io www.talenteed.io;

    # Redirection HTTPS (si SSL configuré)
    # return 301 https://$server_name$request_uri;

    root /var/www/talenteed-front/dist;
    index index.html;

    # Logs
    access_log /var/log/nginx/talenteed-front-access.log;
    error_log /var/log/nginx/talenteed-front-error.log;

    # Compression gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Cache des assets statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Assets Vite (dans le dossier assets/)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fonts
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # CSS
    location /css/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Images
    location /images/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Pages statiques HTML
    location /static/ {
        try_files $uri $uri/ =404;
    }

    # API Backend (proxy vers Laravel)
    location /api/ {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Augmenter les timeouts pour les uploads
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 20M;
    }

    # Storage Laravel (images uploadées)
    location /storage/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Toutes les autres routes -> index.html (Vue Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sécurité : bloquer l'accès aux fichiers sensibles
    location ~ /\. {
        deny all;
    }

    location ~ \.(env|git|gitignore|md)$ {
        deny all;
    }
}

