name: Deploy To Talenteed.io (Production)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Talenteed.io
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_TALENTEED_HOST }}
          username: ${{ secrets.SSH_TALENTEED_USERNAME }}
          password: ${{ secrets.SSH_TALENTEED_PASSWORD }}
          port: ${{ secrets.SSH_TALENTEED_PORT }}
          command_timeout: 30m
          script: |
            #!/bin/bash
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            cd /home/talenteedio/website/frontend || exit 1
            
            nvm use v20
            echo "Node: $(node -v)"
            echo "NPM: $(npm -v)"
            
            git fetch origin
            git reset --hard origin/main
            git pull origin main
            
            npm install
            rm -rf dist/
            npm run build
            
            echo "✅ Deployment completed!"